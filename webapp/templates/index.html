<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mine-files playground</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--text); }
  header { padding:24px 32px; border-bottom:1px solid #334155; }
  h1 { margin:0; font-size:22px; }
  header p { margin:6px 0 0; color:var(--muted); }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; padding:24px 32px; }
  .card { background:var(--card); border:1px solid #334155; border-radius:12px; padding:18px; }
  .card h2 { margin:0 0 12px; font-size:16px; color:var(--accent); }
  label { display:block; font-size:12px; color:var(--muted); margin:8px 0 4px; }
  input, select { width:100%; padding:8px; border-radius:8px; border:1px solid #475569; background:#0f172a; color:var(--text); }
  button { margin-top:12px; width:100%; padding:9px; border:none; border-radius:8px; background:var(--accent); color:#0f172a; font-weight:600; cursor:pointer; }
  button:hover { opacity:.9; }
  .result { margin-top:12px; padding:10px; border-radius:8px; background:#0f172a; font-family:monospace; min-height:20px; word-break:break-all; }
  .result.err { color:#f87171; }
  .result.ok { color:#4ade80; }
  .row { display:flex; gap:8px; }
  .row > div { flex:1; }
</style>
</head>
<body>
<header>
  <h1>mine-files playground</h1>
  <p>Interactive demo of the calculator, string_utils, validator, and stats modules.</p>
</header>
<div class="grid">

  <div class="card">
    <h2>Calculator</h2>
    <label>Operation</label>
    <select id="calc-op">{% for op in calculator_ops %}<option>{{ op }}</option>{% endfor %}</select>
    <div class="row">
      <div><label>a</label><input id="calc-a" value="12"></div>
      <div><label>b</label><input id="calc-b" value="8"></div>
    </div>
    <button onclick="run('/api/calculator', {op:val('calc-op'), a:val('calc-a'), b:val('calc-b')}, 'calc-res')">Compute</button>
    <div class="result" id="calc-res"></div>
    <label>factorial(n)</label>
    <input id="fact-n" value="5">
    <button onclick="run('/api/factorial', {n:val('fact-n')}, 'fact-res')">Factorial</button>
    <div class="result" id="fact-res"></div>
  </div>

  <div class="card">
    <h2>String utils</h2>
    <label>Operation</label>
    <select id="str-op">{% for op in string_ops %}<option>{{ op }}</option>{% endfor %}</select>
    <label>Text</label>
    <input id="str-text" value="A man a plan a canal Panama">
    <button onclick="run('/api/string', {op:val('str-op'), text:val('str-text')}, 'str-res')">Run</button>
    <div class="result" id="str-res"></div>
  </div>

  <div class="card">
    <h2>Validator</h2>
    <label>Operation</label>
    <select id="val-op">{% for op in validator_ops %}<option>{{ op }}</option>{% endfor %}</select>
    <label>Text</label>
    <input id="val-text" value="test@example.com">
    <button onclick="run('/api/validator', {op:val('val-op'), text:val('val-text')}, 'val-res')">Validate</button>
    <div class="result" id="val-res"></div>
  </div>

  <div class="card">
    <h2>Stats</h2>
    <label>Operation</label>
    <select id="stats-op">{% for op in stats_ops %}<option>{{ op }}</option>{% endfor %}</select>
    <label>Numbers (comma or space separated)</label>
    <input id="stats-nums" value="4, 8, 15, 16, 23, 42">
    <button onclick="run('/api/stats', {op:val('stats-op'), numbers:val('stats-nums')}, 'stats-res')">Compute</button>
    <div class="result" id="stats-res"></div>
  </div>

</div>
<script>
  function val(id){ return document.getElementById(id).value; }
  async function run(url, body, target){
    const el = document.getElementById(target);
    el.className = 'result';
    el.textContent = '...';
    try {
      const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
      const data = await r.json();
      if (r.ok){ el.classList.add('ok'); el.textContent = JSON.stringify(data.result); }
      else { el.classList.add('err'); el.textContent = data.error; }
    } catch(e){ el.classList.add('err'); el.textContent = e; }
  }
</script>
</body>
</html>
